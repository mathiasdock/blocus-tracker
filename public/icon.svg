<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fond vert plein (maskable : le système applique le découpage) -->
  <rect width="100" height="100" fill="#10b981"/>

  <!-- Page gauche du livre -->
  <path d="M14 27 C14 23 18 21 22 22 L47 25 L47 75 L22 78 C18 79 14 77 14 73 Z" fill="rgba(255,255,255,0.88)"/>
  <!-- Lignes de texte (notes de cours) -->
  <line x1="21" y1="37" x2="42" y2="36.5" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-opacity="0.45"/>
  <line x1="21" y1="45" x2="43" y2="44.5" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-opacity="0.45"/>
  <line x1="21" y1="53" x2="41" y2="52.5" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-opacity="0.45"/>
  <line x1="21" y1="61" x2="39" y2="60.5" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-opacity="0.45"/>

  <!-- Reliure -->
  <rect x="47" y="25" width="5" height="50" rx="1" fill="#059669"/>

  <!-- Page droite du livre -->
  <path d="M86 27 C86 23 82 21 78 22 L52 25 L52 75 L78 78 C82 79 86 77 86 73 Z" fill="white"/>

  <!-- Cadran horloge sur la page droite -->
  <circle cx="69" cy="50" r="15" fill="none" stroke="#10b981" stroke-width="2.5"/>
  <!-- Ticks 12 / 3 / 6 / 9 -->
  <line x1="69" y1="36.5" x2="69" y2="39.5" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <line x1="82.5" y1="50" x2="79.5" y2="50" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <line x1="69" y1="63.5" x2="69" y2="60.5" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <line x1="55.5" y1="50" x2="58.5" y2="50" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <!-- Aiguille des minutes → 12h -->
  <line x1="69" y1="50" x2="69" y2="39.5" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <!-- Aiguille des heures → ~10h -->
  <line x1="69" y1="50" x2="62.5" y2="43" stroke="#059669" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Centre -->
  <circle cx="69" cy="50" r="2.5" fill="#059669"/>
</svg>
